name: build and deploy

on: workflow_dispatch

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-south-1

      - name: docker image build and push
        run: |
          docker build -t myntra5 .
          aws ecr get-login-password --region eu-west-1 \
          | docker login \
          --username AWS \
          --password-stdin 415696284448.dkr.ecr.eu-west-1.amazonaws.com
          docker tag myntra5:latest 415696284448.dkr.ecr.eu-west-1.amazonaws.com/b17:latest
          docker push 415696284448.dkr.ecr.eu-west-1.amazonaws.com/b17:latest


